name: Playwright Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: insurance-playwright-${{ github.ref }}
      cancel-in-progress: true
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXTAUTH_SECRET: ci-test-secret-minimum-32-characters-long
      NEXTAUTH_URL: http://localhost:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3001
      NEXT_PUBLIC_JANAGANA_PORTAL_BASE_URL: https://janagana.namasteneedham.com
      NEXT_PUBLIC_JANAGANA_API_URL: https://janagana.namasteneedham.com
      NEXT_PUBLIC_JANAGANA_TENANT_SLUG: namaste-boston
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: pnpm run test:unit

      - name: Run Playwright tests
        run: pnpm test
